name: BIST Daily Scan

on:
  schedule:
    # GitHub saatleri UTC'dir. Gecikmeleri (sıra beklemeyi) aşmak için rastgele bir dakika seçiyoruz.
    # 05:23 UTC -> 08:23 TSİ'dir. Piyasalar açılmadan (09:40) raporun gelmesini sağlar.
    - cron: '23 05 * * 1-5'
  
  # Burası sayesinde GitHub üzerinden istediğimiz zaman elle de (manuel) tetikleyebileceğiz.
  workflow_dispatch: 

jobs:
  run-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Kodları Sunucuya Çek
        uses: actions/checkout@v4
        
      - name: Python Ortamını Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          
      - name: Gerekli Kütüphaneleri Yükle
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Günlük Taramayı (Radar) Başlat
        env:
          PYTHONPATH: src
          # Güvenlik için token'larımızı GitHub Secrets'tan alacağız.
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          python scripts/run_daily_scan.py

      - name: Sonuçları GitHub'a Kaydet
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add out/live/live_signals.csv
          if ! git diff --staged --quiet; then
            git commit -m "Otomatik Güncelleme: Günlük tarama sonuçları (live_signals.csv) [skip ci]"
            git push
          else
            echo "Değişiklik bulunamadı, commit işlemi atlanıyor."
          fi
